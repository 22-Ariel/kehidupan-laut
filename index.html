<!DOCTYPE html>
<html>
  <head>
    <title>Menstra AR - Kehidupan Laut</title>
    <!-- Memanggil A-Frame dan AR.js -->
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0px; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <!-- Memuat file 3D .glb yang baru kamu upload -->
      <a-assets>
        <a-asset-item id="model-laut" src="laut.glb"></a-asset-item>
      </a-assets>

      <!-- Mendeteksi Hiro Marker (Huruf H Asli) -->
      <a-marker preset="hiro">
        <!-- Menampilkan model 3D di atas marker -->
        <a-entity gltf-model="#model-laut" 
                  position="0 0 0" 
                  scale="0.5 0.5 0.5"
                  rotation="0 0 0">
        </a-entity>
      </a-marker>
      
      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
