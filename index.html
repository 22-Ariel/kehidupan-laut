<!DOCTYPE html>
<html>
  <head>
    <title>Menstra AR - Kehidupan Laut</title>
    <!-- Memanggil pustaka A-Frame dan AR.js -->
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0px; overflow: hidden;">
    <!-- Mengaktifkan sistem AR dengan Kamera HP -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <!-- Mendeteksi Hiro Marker (Kotak H) -->
      <a-marker preset="hiro">
        <!-- Teks sementara untuk tes apakah AR berhasil atau tidak -->
        <a-text value="Menstra AR Berhasil!\nHiu & Kuda Laut Siap Dipanggil." 
                position="0 0.5 0" 
                align="center" 
                color="#00FFF6" 
                rotation="-90 0 0">
        </a-text>
      </a-marker>
      
      <!-- Kamera AR -->
      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
