<!-- Hiu sebagai wadah utama -->
<a-entity 
    id="hiu-container"
    position="0 0 0"
    animation__pos="property: position; to: 10 0 0; dur: 12000; easing: linear; loop: true; dir: alternate;"
    animation__rot="property: rotation; to: 0 360 0; dur: 12000; easing: linear; loop: true;"
>
    <!-- Model Hiu -->
    <a-gltf-model 
        id="hiu"
        src="#hiu-model"
        position="0 0 0"
        tail-whip="speed: 1.8; amplitude: 18;"
    >
    </a-gltf-model>

    <!-- Kamera diposisikan tepat di depan mata hiu -->
    <!-- Sesuaikan nilai 'position' jika dirasa terlalu dekat/jauh -->
    <a-camera position="0 0.5 1.5" rotation="0 180 0"></a-camera>
</a-entity>
