<!DOCTYPE html>
<html>
  <head>
    <title>Menstra AR</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
  </head>
  <body style="margin: 0px; overflow: hidden;">
    
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
      
      <!-- Aset suara -->
      <a-assets>
        <audio id="musik-laut" src="sounds/musik.mp3" loop="true" preload="auto"></audio>
      </a-assets>

      <!-- Marker Hiro -->
      <a-marker preset="hiro" id="marker-hiro">
        
        <!-- PENGATURAN POSISI BARU -->
        <!-- Ubah rotation="-90 0 0" (samping) menjadi rotation="-90 90 0" (depan) -->
        <!-- Ubah position="-0.3 0 0" sedikit ke kiri agar manatee di tengah -->
       <a-entity gltf-model="kehidupan_2laut.glb" 
          scale="0.25 0.25 0.25" 
          rotation="-180 0 180"  <-- Ganti dengan ini
          position="-0.3 0 0"
          animation-mixer>
      </a-entity>

      </a-marker>
      
      <a-entity camera></a-entity>
    </a-scene>

    <script>
      const marker = document.querySelector('#marker-hiro');
      const music = document.querySelector('#musik-laut');

      // Fungsi untuk play suara
      const startSound = () => {
        if (music.paused) {
            music.play().catch(error => console.log("Gagal play otomatis, butuh interaksi user:", error));
        }
      };

      // Fungsi untuk pause suara
      const stopSound = () => {
        music.pause();
        music.currentTime = 0;
      };

      // Event Listener saat marker terdeteksi
      marker.addEventListener('markerFound', startSound);
      // Event Listener saat marker hilang
      marker.addEventListener('markerLost', stopSound);

      // Tambahan: Pastikan audio siap diputar
      window.addEventListener('load', () => {
          music.load();
      });
      
      // Tambahan: Memicu suara jika browser memblokir autoplay (harus tap layar)
      document.body.addEventListener('click', startSound, { once: true });
    </script>
  </body>
</html>
