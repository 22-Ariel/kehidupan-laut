<!DOCTYPE html>
<html>
  <head>
    <title>Menstra AR - Kehidupan Laut</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <!-- PUSTAKA TAMBAHAN UNTUK MEMUTAR ANIMASI BLENDER -->
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
  </head>
  <body style="margin: 0px; overflow: hidden;">
    
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <!-- Mendeteksi Hiro Marker -->
      <a-marker preset="hiro">
        
        <!-- MEMANGGIL MODEL 3D + MENYALAKAN ANIMASI (animation-mixer) -->
        <a-entity gltf-model="kehidupan_2laut.glb" 
                  position="0 0 0" 
                  scale="0.2 0.2 0.2" 
                  rotation="0 0 0"
                  animation-mixer> <!-- Perintah ini yang membuat hiu & kuda laut bergerak -->
        </a-entity>

      </a-marker>
      
      <a-entity camera></a-entity>
    </a-scene>
    
  </body>
</html>
