<!DOCTYPE html>
<html>
  <head>
    <title>Menstra AR - Kehidupan Laut</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0px; overflow: hidden;">
    
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <!-- Mendeteksi Hiro Marker -->
      <a-marker preset="hiro">
        
        <!-- MEMANGGIL FILE KAMU YANG SEBENARNYA -->
        <!-- Catatan: Jika di GitHub ada tulisan .glb di ujungnya, ubah menjadi kehidupan_2laut.glb -->
        <a-entity gltf-model="kehidupan_2laut.glb" 
                  position="0 0 0" 
                  scale="0.2 0.2 0.2" 
                  rotation="0 0 0">
        </a-entity>

        <!-- KOTAK CADANGAN (Jika kotak ini muncul tapi model 3D belum ada, berarti nama filenya perlu dicek lagi ekstensinya) -->
        <a-box position="0 0.5 0" material="color: green; opacity: 0.5;" scale="0.3 0.3 0.3"></a-box>

      </a-marker>
      
      <a-entity camera></a-entity>
    </a-scene>
    
  </body>
</html>
