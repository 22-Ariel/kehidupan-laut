<!DOCTYPE html>
<html>
  <head>
    <title>Menstra AR</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
  </head>
  <body style="margin: 0px; overflow: hidden;">
    
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
      
      <!-- Menambahkan aset suara di sini agar lebih stabil -->
      <a-assets>
        <audio id="musik-laut" src="sounds/musik.mp3" preload="auto"></audio>
      </a-assets>

      <a-marker preset="hiro">
        <a-entity gltf-model="kehidupan_2laut.glb" 
                  scale="0.2 0.2 0.2" 
                  rotation="-90 0 0" 
                  animation-mixer
                  sound="src: #musik-laut; autoplay: true; loop: true; volume: 1;">
        </a-entity>
      </a-marker>
      
      <a-entity camera></a-entity>
      
      <!-- Tambahan: Memaksa suara untuk mulai saat layar disentuh pertama kali -->
      <script>
        document.querySelector('a-scene').addEventListener('click', function () {
            let soundEntity = document.querySelector('[sound]');
            soundEntity.components.sound.playSound();
        });
      </script>
    </a-scene>
  </body>
</html>
