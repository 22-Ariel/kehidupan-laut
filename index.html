<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Kehidupan Laut</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
</head>
<body>

    <a-scene background="color: #003366">
        <a-assets>
            <!-- Menggunakan nama file yang sesuai dengan struktur folder kamu -->
            <a-asset-item id="hiu-model" src="kehidupan_2laut.glb"></a-asset-item>
        </a-assets>

        <!-- Kamera di depan objek -->
        <a-camera position="0 1.6 3"></a-camera>

        <!-- Wadah Hiu -->
        <a-entity 
            id="hiu-container"
            position="0 0 -5"
            animation="property: position; to: 0 0 -15; dur: 5000; easing: linear; loop: true; dir: alternate;"
        >
            <a-gltf-model 
                id="hiu"
                src="#hiu-model"
                rotation="0 180 0"
            >
            </a-gltf-model>
        </a-entity>

        <a-light type="ambient" intensity="0.8"></a-light>
    </a-scene>

</body>
</html>
