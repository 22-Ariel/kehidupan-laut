<!DOCTYPE html>
<html>
  <head>
    <title>Menstra AR</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
  </head>
  <body style="margin: 0px; overflow: hidden;">
    
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
      
      <!-- Aset suara -->
      <a-assets>
        <audio id="musik-laut" src="sounds/musik.mp3" loop="true"></audio>
      </a-assets>

      <!-- Menggunakan markerhandler agar suara terpicu saat marker terdeteksi -->
      <a-marker preset="hiro" id="marker-hiro">
        <a-entity gltf-model="kehidupan_2laut.glb" 
                  scale="0.2 0.2 0.2" 
                  rotation="-90 0 0" 
                  animation-mixer>
        </a-entity>
      </a-marker>
      
      <a-entity camera></a-entity>
    </a-scene>

    <script>
      const marker = document.querySelector('#marker-hiro');
      const music = document.querySelector('#musik-laut');

      marker.addEventListener('markerFound', () => {
        music.play();
      });

      marker.addEventListener('markerLost', () => {
        music.pause();
        music.currentTime = 0; // Reset ke awal saat marker hilang
      });
    </script>
  </body>
</html>
